# fly.toml app configuration file generated for pocketbase-docker-268v0g on 2026-04-09T16:05:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pocketbase-docker-268v0g'
primary_region = 'gru'

[mounts]
  source = "pb_data" # name of the volume
  destination = "/pb/pb_data"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
  [http_service.concurrency]
    type = "requests"
    soft_limit = 500
    hard_limit = 550

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
